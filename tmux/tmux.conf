set-window-option -g mode-keys vi
set -g mouse on

# faster escape time (important for vim/neovim)
set -sg escape-time 0

# true color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# start windows and panes at index 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# increase history limit
set -g history-limit 50000

# focus events for vim plugins
set -g focus-events on

# vim-like pane switching
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# vim-like pane resizing
bind -r C-k resize-pane -U
bind -r C-j resize-pane -D
bind -r C-h resize-pane -L
bind -r C-l resize-pane -R

bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel 'if [ -n "$WAYLAND_DISPLAY" ]; then wl-copy; else xclip -in -selection clipboard; fi'
